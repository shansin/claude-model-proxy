ollama_base_url: http://localhost:11434

# Address this proxy listens on — used only to print the Claude launch command at startup.
# Must match the --host / --port flags you pass to uvicorn.
proxy_host: localhost
proxy_port: 8082

# Map Claude model name fragments (substring match, case-insensitive) to Ollama models.
# Add or remove entries freely — "default" is used when nothing else matches.
model_map:
  opus:    glm-4.7-flash:latest
  sonnet:  glm-4.7-flash:latest
  haiku:   glm-4.7-flash:latest
  default: glm-4.7-flash:latest

# Context window size (num_ctx) per model class.
# Omit a key to use the Ollama model's built-in default.
# Override with env vars: OLLAMA_CONTEXT_SIZE_OPUS, OLLAMA_CONTEXT_SIZE_SONNET, etc.
context_size:
  opus:    32768
  sonnet:  32768
  haiku:   8192
  default: 32768
